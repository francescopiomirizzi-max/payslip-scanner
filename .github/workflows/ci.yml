name: CI

# Rete di sicurezza per i numeri che finiscono in tribunale:
# ogni push e ogni PR deve passare type-check + test del motore di calcolo.
on:
  push:
  pull_request:

# Annulla run obsolete sullo stesso ref (risparmia minuti CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (da .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Il package-lock.json è generato con npm 11 (Node 24 in locale). L'npm 10
      # montato da Node 22 rifiuta l'override "rollup -> @rollup/wasm-node" con
      # EBADPLATFORM in `npm ci`. Allineiamo npm a quello con cui nasce il lockfile.
      - name: Allinea npm al lockfile (npm 11)
        run: npm i -g npm@11

      - name: Install (riproducibile dal lockfile)
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run
