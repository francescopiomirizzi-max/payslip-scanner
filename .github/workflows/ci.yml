name: CI

# Rete di sicurezza per i numeri che finiscono in tribunale:
# ogni push e ogni PR deve passare type-check + test del motore di calcolo.
on:
  push:
  pull_request:

# Annulla run obsolete sullo stesso ref (risparmia minuti CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (da .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Node 24 (vedi .nvmrc) porta npm 11 nativo, lo stesso con cui è generato
      # il package-lock.json. Quindi `npm ci` rispetta l'override
      # "rollup -> @rollup/wasm-node" senza il vecchio EBADPLATFORM.
      - name: Install (riproducibile dal lockfile)
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run
