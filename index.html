<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/railway-app-icon.svg" />
  <!-- Fallback PNG: Safari < 16 e browser senza favicon SVG -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <!-- iOS "Aggiungi a Home" ignora gli SVG: serve il PNG dedicato -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Colore della UI del browser; lo script del tema lo allinea a chiaro/scuro -->
  <meta name="theme-color" content="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailFlow — Gestionale Ferrovieri</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>
<script>
  // Controlla la memoria PRIMA di caricare la pagina
  if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  // theme-color della barra browser allineato al tema scelto (indigo / slate-900)
  document.querySelector('meta[name="theme-color"]')
    ?.setAttribute('content', document.documentElement.classList.contains('dark') ? '#0f172a' : '#4f46e5');
</script>

<body>
  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
