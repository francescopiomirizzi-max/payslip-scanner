<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon come il logo in-app: BIANCA su tema scuro, colorata su tema chiaro
       (la bianca su tab chiara è invisibile). Le colorate per ultime: i browser
       che ignorano `media` prendono l'ultima, e la colorata si vede su entrambi i fondi. -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-white-32.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-white-192.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" media="(prefers-color-scheme: light)" />
  <!-- iOS "Aggiungi a Home" -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Colore della UI del browser; lo script del tema lo allinea a chiaro/scuro -->
  <meta name="theme-color" content="#1E3A5F" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valora — Ufficio Vertenze</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>
<script>
  // Controlla la memoria PRIMA di caricare la pagina
  if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  // theme-color della barra browser allineato al tema scelto (navy / slate-900)
  document.querySelector('meta[name="theme-color"]')
    ?.setAttribute('content', document.documentElement.classList.contains('dark') ? '#0f172a' : '#1E3A5F');
</script>

<body>
  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
